{% extends "base.html" %}
{% block content %}

<div style="max-width:480px;margin:0 auto;padding-top:60px;animation:fadeUp 0.5s ease both;">
    <div class="card" style="text-align:center;padding:40px;">

        <div style="width:64px;height:64px;background:rgba(239,68,68,0.1);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 20px;">⚠️</div>

        <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:20px;margin-bottom:10px;">Удалить группу?</div>

        <div style="color:var(--muted);font-size:14px;margin-bottom:28px;line-height:1.6;">
            Вы собираетесь удалить группу <span style="color:var(--text);font-weight:600;">{{ group }}</span>.<br>
            Все студенты этой группы тоже будут удалены.
        </div>

        <form method="post" style="display:flex;gap:10px;justify-content:center;">
            {% csrf_token %}
            <a href="{% url 'group_list' %}" class="btn btn-ghost">Отмена</a>
            <button type="submit" class="btn btn-danger">🗑 Да, удалить</button>
        </form>

    </div>
</div>

{% endblock %}
