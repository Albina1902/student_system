{% extends "base.html" %}
{% block title %}Удалить задание{% endblock %}
{% block content %}
<div class="confirm-card">
  <h2 class="confirm-title">Удалить задание?</h2>
  <p class="confirm-text">{{ obj.title }} — {{ obj.course.title }}</p>
  <form method="post" class="confirm-actions">
    {% csrf_token %}
    <button type="submit" class="btn-danger">Да, удалить</button>
    <a href="{% url 'homework_list' %}" class="btn-outline">Отмена</a>
  </form>
</div>
{% endblock %}
