{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="page-header">
  <div><h1 class="page-title">{{ title }}</h1></div>
  <a href="{% url 'homework_list' %}" class="btn-outline">← Назад</a>
</div>
<div class="form-card">
  <form method="post">
    {% csrf_token %}
    <div class="form-grid">
      {% for field in form %}
      <div class="form-group {% if field.name == 'description' %}full-width{% endif %}">
        <label class="form-label">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}<span class="form-error">{{ field.errors.0 }}</span>{% endif %}
      </div>
      {% endfor %}
    </div>
    <div class="form-actions">
      <button type="submit" class="btn-primary">Сохранить</button>
      <a href="{% url 'homework_list' %}" class="btn-outline">Отмена</a>
    </div>
  </form>
</div>
{% endblock %}
