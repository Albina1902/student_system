<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSystem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080c14;
            --surface: #0e1520;
            --surface2: #131c2e;
            --border: rgba(99,179,237,0.08);
            --accent: #38bdf8;
            --accent2: #818cf8;
            --accent3: #34d399;
            --accent4: #fb923c;
            --text: #e2e8f0;
            --muted: #64748b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            overflow-x: hidden;
        }

        /* Noise texture overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        /* Glow blobs */
        .blob1 {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(56,189,248,0.04) 0%, transparent 70%);
            top: -200px;
            left: -100px;
            pointer-events: none;
            z-index: 0;
        }
        .blob2 {
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(129,140,248,0.04) 0%, transparent 70%);
            bottom: -100px;
            right: 100px;
            pointer-events: none;
            z-index: 0;
        }

        /* Sidebar */
        aside {
            width: 240px;
            min-height: 100vh;
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 32px 20px;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 20px;
            color: var(--accent);
            letter-spacing: -0.5px;
            padding: 0 12px 24px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        nav a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 10px;
            color: var(--muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            position: relative;
        }

        nav a:hover {
            background: var(--surface2);
            color: var(--text);
        }

        nav a.active {
            background: rgba(56,189,248,0.08);
            color: var(--accent);
        }

        nav a.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 20px;
            background: var(--accent);
            border-radius: 0 4px 4px 0;
        }

        .nav-icon {
            width: 18px;
            text-align: center;
            font-size: 16px;
        }

        .sidebar-footer {
            margin-top: auto;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        /* Main */
        main {
            margin-left: 240px;
            flex: 1;
            padding: 40px 48px;
            position: relative;
            z-index: 1;
        }

        /* Page header */
        .page-header {
            margin-bottom: 40px;
            animation: fadeUp 0.5s ease both;
        }

        .page-header h1 {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 32px;
            letter-spacing: -1px;
            color: var(--text);
            line-height: 1.1;
        }

        .page-header p {
            color: var(--muted);
            font-size: 14px;
            margin-top: 6px;
        }

        /* Cards */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            transition: border-color 0.2s, transform 0.2s;
        }

        .card:hover {
            border-color: rgba(99,179,237,0.15);
            transform: translateY(-2px);
        }

        /* Stat cards */
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            position: relative;
            overflow: hidden;
            animation: fadeUp 0.5s ease both;
            transition: border-color 0.2s, transform 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            border-color: rgba(99,179,237,0.2);
        }

        .stat-card::after {
            content: '';
            position: absolute;
            top: -40px;
            right: -40px;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            opacity: 0.06;
        }

        .stat-card.blue::after { background: var(--accent); }
        .stat-card.purple::after { background: var(--accent2); }
        .stat-card.green::after { background: var(--accent3); }
        .stat-card.orange::after { background: var(--accent4); }

        .stat-label {
            font-size: 12px;
            font-weight: 500;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 12px;
        }

        .stat-value {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 42px;
            line-height: 1;
            letter-spacing: -2px;
        }

        .stat-value.blue { color: var(--accent); }
        .stat-value.purple { color: var(--accent2); }
        .stat-value.green { color: var(--accent3); }
        .stat-value.orange { color: var(--accent4); }

        /* Table */
        table { width: 100%; border-collapse: collapse; }
        th {
            font-size: 11px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 0 16px 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        td {
            padding: 14px 16px;
            font-size: 14px;
            border-bottom: 1px solid var(--border);
            color: var(--text);
        }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(99,179,237,0.03); }

        /* Badges */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 3px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 500;
        }
        .badge-blue { background: rgba(56,189,248,0.1); color: var(--accent); }
        .badge-green { background: rgba(52,211,153,0.1); color: var(--accent3); }
        .badge-purple { background: rgba(129,140,248,0.1); color: var(--accent2); }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            border: none;
        }
        .btn-primary {
            background: var(--accent);
            color: #080c14;
        }
        .btn-primary:hover { background: #7dd3fc; }
        .btn-ghost {
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
        .btn-danger {
            background: rgba(239,68,68,0.1);
            color: #f87171;
            border: 1px solid rgba(239,68,68,0.2);
        }
        .btn-danger:hover { background: rgba(239,68,68,0.2); }

        /* Form */
        .form-group { margin-bottom: 20px; }
        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 8px;
        }
        input, select, textarea {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 14px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            transition: border-color 0.2s;
            outline: none;
        }
        input:focus, select:focus, textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(56,189,248,0.08);
        }

        /* Animations */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .anim-1 { animation-delay: 0.05s; }
        .anim-2 { animation-delay: 0.1s; }
        .anim-3 { animation-delay: 0.15s; }
        .anim-4 { animation-delay: 0.2s; }
        .anim-5 { animation-delay: 0.25s; }

        /* Messages */
        .messages { margin-bottom: 24px; }
        .message {
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 8px;
            border: 1px solid;
        }
        .message.success { background: rgba(52,211,153,0.08); border-color: rgba(52,211,153,0.2); color: var(--accent3); }
        .message.error { background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.2); color: #f87171; }
        .message.warning { background: rgba(251,146,60,0.08); border-color: rgba(251,146,60,0.2); color: var(--accent4); }
    </style>
</head>
<body>
    <div class="blob1"></div>
    <div class="blob2"></div>

    <aside>
        <div class="logo">
            <div class="logo-icon">🎓</div>
            EduSystem
        </div>
        <nav>
            <a href="/" class="{% if request.path == '/' %}active{% endif %}">
                <span class="nav-icon">⬛</span> Dashboard
            </a>
            <a href="/students/" class="{% if '/students/' in request.path %}active{% endif %}">
                <span class="nav-icon">👤</span> Students
            </a>
            <a href="/groups/" class="{% if '/groups/' in request.path %}active{% endif %}">
                <span class="nav-icon">👥</span> Groups
            </a>
            <a href="/courses/" class="{% if '/courses/' in request.path %}active{% endif %}">
    <span class="nav-icon">📚</span> Courses
</a>
<a href="/grades/" class="{% if '/grades/' in request.path %}active{% endif %}">
                <span class="nav-icon">⭐</span> Grades
            </a>
            <a href="/homework/" class="{% if '/homework/' in request.path %}active{% endif %}">
                <span class="nav-icon">📝</span> Homework
            </a>
            <a href="/schedule/" class="{% if '/schedule/' in request.path %}active{% endif %}">
                <span class="nav-icon">📅</span> Schedule
            </a>
            </a>
        </nav>
        <div class="sidebar-footer">
            <a href="/api/" style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;color:var(--muted);text-decoration:none;font-size:13px;transition:all 0.2s;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--muted)'">
                <span>⚡</span> API Explorer
            </a>
        </div>
    </aside>

    <main>
        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="message {{ message.tags }}">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>
</body>
</html>
